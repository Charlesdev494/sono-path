<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>Sem conexão · US360</title>
    <!--
      Página estática de propósito: ela precisa funcionar justamente quando
      nada mais funciona. Sem JS, sem fonte externa, sem CSS de fora — se
      dependesse da rede, não apareceria na única hora em que é necessária.
    -->
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 2rem 1.5rem;
        text-align: center;
        background: linear-gradient(160deg, #1e3a8a, #2d4fa8);
        color: #fff;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .icone {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 1.25rem;
        background: rgba(255, 255, 255, 0.14);
      }
      h1 {
        margin: 0;
        font-size: 1.375rem;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        max-width: 22rem;
        font-size: 0.9375rem;
        line-height: 1.6;
        opacity: 0.85;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.75rem 1.75rem;
        border: 0;
        border-radius: 0.75rem;
        background: #fff;
        color: #1e3a8a;
        font-size: 0.9375rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      button:active {
        transform: scale(0.98);
      }
      .rodape {
        position: fixed;
        bottom: 1.5rem;
        font-size: 0.75rem;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="icone">
      <svg
        width="32"
        height="32"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <path d="M12 20h.01" />
        <path d="M8.5 16.429a5 5 0 0 1 7 0" />
        <path d="M5 12.859a10 10 0 0 1 5.17-2.69" />
        <path d="M19 12.859a10 10 0 0 0-2.007-1.523" />
        <path d="M2 8.82a15 15 0 0 1 4.177-2.643" />
        <path d="M22 8.82a15 15 0 0 0-11.288-3.764" />
        <path d="m2 2 20 20" />
      </svg>
    </div>

    <h1>Sem conexão</h1>
    <p>
      O US360 precisa de internet para carregar suas questões e seu progresso. Assim que a conexão
      voltar, é só tocar em recarregar — nada do seu progresso se perde.
    </p>

    <button onclick="location.reload()">Tentar de novo</button>

    <p class="rodape">US360 · Sonoanatomia</p>

    <script>
      // Recarrega sozinho quando a rede voltar, para a pessoa não ficar
      // olhando para uma tela morta sem saber que já dava para continuar.
      window.addEventListener("online", () => location.reload());
    </script>
  </body>
</html>
